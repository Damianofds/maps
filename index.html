<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mappe Roma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #52606d;
      --line: #d8dee6;
      --panel: #ffffff;
      --bg: #eef2f3;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      margin: 0 auto;
      max-width: 920px;
      padding: 48px 20px;
    }
    h1 {
      font-size: clamp(32px, 7vw, 56px);
      letter-spacing: 0;
      line-height: 1;
      margin: 0 0 16px;
    }
    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      margin: 0 0 28px;
      max-width: 680px;
    }
    .maps {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    a {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      display: block;
      min-height: 132px;
      padding: 20px;
      text-decoration: none;
    }
    a:hover { border-color: #52606d; }
    strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
    }
    span {
      color: var(--muted);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>Mappe Roma</h1>
    <p>Client statici per le mappe della ZTL di Roma e dell'ecosistema dell'innovazione.</p>
    <div class="maps">
      <a href="roma-ztl/">
        <strong>Roma ZTL</strong>
        <span>Livelli di mobilita, fasce ambientali, varchi e ZTL.</span>
      </a>
      <a href="roma-innovazione/">
        <strong>Roma Innovazione</strong>
        <span>Aziende e organizzazioni tecnologiche presenti a Roma.</span>
      </a>
    </div>
  </main>
</body>
</html>
